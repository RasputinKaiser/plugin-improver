name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run validator
        run: python3 scripts/validate.py

      - name: Curator selftest
        run: python3 skills/skill-curator/scripts/curator.py selftest

      - name: Scorer selftest
        run: python3 scripts/score.py selftest

      - name: Portfolio selftest
        run: python3 scripts/portfolio.py selftest

      - name: Calibrate selftest (saturation meter)
        run: python3 scripts/calibrate.py selftest

      - name: Self-score floor (deterministic auto-score must not regress)
        run: python3 scripts/score.py . --min 70
